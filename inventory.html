<!-- Inventory Grid (DYNAMIC) -->
<div class="inventory-grid compact" id="inventoryGrid">
    <!-- Cars will be loaded here from backend -->
    <div class="loading-spinner" style="text-align: center; padding: 40px; grid-column: 1/-1;">
        <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--gold);"></i>
        <p style="margin-top: 20px; color: var(--muted);">Loading premium inventory...</p>
    </div>
</div>

<!-- ... (rest of the page remains same until the script block) ... -->

<script src="script.js"></script>
<script>
    // Global variables for filtering
    let allCars = []; // Store all cars for client-side filtering
    
    // Load cars from backend
    async function loadCars() {
        try {
            const response = await fetch('/api/cars');
            const cars = await response.json();
            allCars = cars;
            renderCars(cars);
            updateVehicleCount(cars.length);
        } catch (error) {
            console.error('Error loading cars:', error);
            document.getElementById('inventoryGrid').innerHTML = `
                <div style="text-align: center; padding: 40px; grid-column: 1/-1;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #e74c3c; margin-bottom: 20px;"></i>
                    <h3 style="color: var(--text); margin-bottom: 10px;">Unable to load inventory</h3>
                    <p style="color: var(--muted);">Please try again later or contact us directly.</p>
                    <button class="btn btn-gold" onclick="loadCars()" style="margin-top: 20px;">
                        <i class="fas fa-redo"></i> Retry
                    </button>
                </div>
            `;
        }
    }
    
    // Render car cards
    function renderCars(cars) {
        const grid = document.getElementById('inventoryGrid');
        if (!cars.length) {
            grid.innerHTML = `
                <div style="text-align: center; padding: 40px; grid-column: 1/-1;">
                    <i class="fas fa-car" style="font-size: 48px; color: var(--muted); margin-bottom: 20px;"></i>
                    <h3 style="color: var(--text); margin-bottom: 10px;">No vehicles available</h3>
                    <p style="color: var(--muted);">Check back soon or contact us for custom sourcing.</p>
                </div>
            `;
            return;
        }
        
        let html = '';
        cars.forEach(car => {
            html += `
                <div class="card inventory-card" 
                     data-id="${car.id}"
                     data-brand="${car.make.toLowerCase()}"
                     data-model="${car.model.toLowerCase()}"
                     data-year="${car.year}"
                     data-price="${car.price}"
                     data-type="${car.type || ''}"
                     data-transmission="${car.transmission || ''}"
                     data-fuel="${car.fuel || ''}"
                     data-color="${car.color || ''}"
                     data-location="${car.location || ''}"
                     data-mileage="${car.mileage || 0}">
                    <img src="${car.image_url || 'https://images.unsplash.com/photo-1555212697-194d092e3b8f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'}" alt="${car.make} ${car.model}">
                    <div class="inventory-content">
                        <h3>${car.year} ${car.make} ${car.model}</h3>
                        <div class="price">$${Number(car.price).toLocaleString()}</div>
                        <p>${car.transmission || 'Auto'} • ${car.fuel || 'Petrol'} • ${car.mileage?.toLocaleString() || '0'} miles</p>
                        <div class="actions">
                            <button class="btn btn-gold btn-sm" onclick="openServiceModal('vehicle-sales', '${car.year} ${car.make} ${car.model}')">
                                <i class="fab fa-whatsapp"></i> Inquiry
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
    }
    
    // Update vehicle count display
    function updateVehicleCount(count) {
        document.getElementById('vehicleCount').textContent = count;
    }
    
    // Modified applyFilters to work with allCars
    function applyFilters() {
        const brand = document.getElementById('brandFilter').value.toLowerCase();
        const model = document.getElementById('modelFilter').value.toLowerCase();
        const minYear = parseInt(document.getElementById('minYear').value) || 0;
        const maxYear = parseInt(document.getElementById('maxYear').value) || 9999;
        const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
        const maxPrice = parseInt(document.getElementById('maxPrice').value) || 9999999;
        const type = document.getElementById('typeFilter').value.toLowerCase();
        const transmission = document.getElementById('transmissionFilter').value.toLowerCase();
        const fuel = document.getElementById('fuelFilter').value.toLowerCase();
        const color = document.getElementById('colorFilter').value.toLowerCase();
        const location = document.getElementById('locationFilter').value.toLowerCase();
        
        const filtered = allCars.filter(car => {
            let show = true;
            if (brand && car.make.toLowerCase() !== brand) show = false;
            if (model && !car.model.toLowerCase().includes(model)) show = false;
            if (car.year < minYear || car.year > maxYear) show = false;
            if (car.price < minPrice || car.price > maxPrice) show = false;
            if (type && (car.type || '').toLowerCase() !== type) show = false;
            if (transmission && (car.transmission || '').toLowerCase() !== transmission) show = false;
            if (fuel && (car.fuel || '').toLowerCase() !== fuel) show = false;
            if (color && (car.color || '').toLowerCase() !== color) show = false;
            if (location && (car.location || '').toLowerCase() !== location) show = false;
            return show;
        });
        
        renderCars(filtered);
        updateVehicleCount(filtered.length);
        
        // Remove no-results message if present (handled in renderCars)
    }
    
    function resetFilters() {
        document.getElementById('brandFilter').value = '';
        document.getElementById('modelFilter').value = '';
        document.getElementById('minYear').value = '';
        document.getElementById('maxYear').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('typeFilter').value = '';
        document.getElementById('transmissionFilter').value = '';
        document.getElementById('fuelFilter').value = '';
        document.getElementById('colorFilter').value = '';
        document.getElementById('locationFilter').value = '';
        document.getElementById('sortFilter').value = 'featured';
        
        renderCars(allCars);
        updateVehicleCount(allCars.length);
    }
    
    function sortVehicles() {
        const sortBy = document.getElementById('sortFilter').value;
        const container = document.getElementById('inventoryGrid');
        const cars = Array.from(container.children).filter(el => el.classList.contains('inventory-card'));
        
        // Extract car data from DOM (since we have allCars, we could also re-render)
        // For simplicity, we'll re-sort the allCars array and re-render
        let sortedCars = [...allCars];
        switch(sortBy) {
            case 'price_low':
                sortedCars.sort((a, b) => a.price - b.price);
                break;
            case 'price_high':
                sortedCars.sort((a, b) => b.price - a.price);
                break;
            case 'year_new':
                sortedCars.sort((a, b) => b.year - a.year);
                break;
            case 'year_old':
                sortedCars.sort((a, b) => a.year - b.year);
                break;
            case 'mileage_low':
                sortedCars.sort((a, b) => (a.mileage || 0) - (b.mileage || 0));
                break;
            default:
                // featured - keep as is (original order from API)
                sortedCars = allCars;
        }
        
        renderCars(sortedCars);
    }
    
    // Load more vehicles (pagination) - simplified for now
    function loadMoreVehicles() {
        // For a real implementation, you'd fetch the next page and append
        alert('Pagination will be implemented with backend support. Currently showing all vehicles.');
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadCars();
        
        // Set up filter input events
        document.getElementById('modelFilter').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                applyFilters();
            }
        });
    });
</script>
